<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>donation</title>
  <link rel="stylesheet" href="css/donation.css">
</head>
<body>
  <header class="header">  
  <div class="logo">  
    <img src="images/IMG-20260225-WA0028.jpg" alt="logo">  
  </div>  
  <nav class="nav" id="nav">  
    <ul>  
      <li><a href="index.html">الرئيسية</a></li>  
      <li><a href="charity.html">الجمعيات</a></li>  
      <li><a href="about.html">عن المنصة</a></li>  
      <li><a href="contact.html">تواصل معنا</a></li>  
    </ul>  
  </nav>  
  <div class="buttons">  
    <button class="login">دخول</button>  
    <button class="signup">حساب جديد</button>  
  </div>  
  <div class="menu" id="menu">☰</div>  
</header>  
  
<section class="donation_page">  
  <div class="image">  
    <div class="text"><p>تبرع الآن</p></div>  
  </div>  
  
  <form class="form" id="donationForm">  
    <div class="card">  
      <h3>بيانات التواصل</h3>  
      <div class="group">  
        <label for="Name">الاسم بالكامل</label>  
        <input type="text" id="Name" name="name" placeholder="أدخل الاسم" required>  
      </div>  
      <div class="group">  
        <label for="Email">البريد الإلكتروني</label>  
        <input type="email" id="Email" name="email" placeholder="ex@gmail.com" required>  
      </div>  
      <div class="row">  
        <div class="group">  
          <label for="Phone">الهاتف</label>  
          <input type="tel" id="Phone" name="phone" placeholder="01*********" required>  
        </div>  
        <div class="group">  
          <label for="Address">العنوان بالتفصيل</label>  
          <input type="text" id="Address" name="address" placeholder="المحافظة - المدينة - الشارع" required>  
        </div>  
      </div>  
    </div>  
  
    <div class="card">  
      <h3>تفاصيل الملابس</h3>  
      <div class="group">  
        <label>نوع الملابس</label>  
        <div class="radio-group">  
         <label>
  <input type="radio" name="type" value="رجالي" checked>
  <span>رجالي</span>
</label>

<label>
  <input type="radio" name="type" value="حريمي">
  <span>حريمي</span>
</label>

<label>
  <input type="radio" name="type" value="أطفال">
  <span>أطفال</span>
</label>
        </div>  
      </div>  
  
      <div class="group">  
        <label for="size">المقاس</label>  
        <select id="size" name="size">  
          <option value="">اختر المقاس</option>  
          <option>XS</option><option>S</option><option>M</option>  
          <option>L</option><option>XL</option><option>XXL</option>  
          <option>3XL</option><option>4XL</option><option>5XL</option>  
        </select>  
      </div>  
  
      <div class="group">  
        <label for="Description">وصف إضافي</label>  
        
        <textarea id="Description" rows="3" name="description" placeholder="مثلاً: قميص أزرق بحالة ممتازة..."></textarea>  
      </div>  
  
      <div class="row">  
        <div class="group">  
          <label for="quantity">العدد</label>  
          <input type="number" id="quantity" name="quantity" value="1" min="1">  
        </div>  
        <div class="group">  
          <label for="condition">الحالة</label>  
         
          <select id="condition" name="condition">  
            <option value="">اختر الحالة</option>  
            <option value="new">جديدة</option>  
            <option value="excellent">ممتازة</option>  
            <option value="good">جيدة</option>  
          </select>  
        </div>  
      </div>  
  
      <div class="group">  
        <label for="img">صور الملابس (بحد أقصى 5)</label>  
        <input type="file" id="img" name="images" multiple accept="image/*">  
        <div id="previewBox"></div>  
      </div>  
    </div>  
  
    <div class="card">  
      <h3>اختر الجمعية</h3>  
      <div id="charityContainer">  
        <label>
  <input type="radio" name="charityId" value="1">
  <span>جمعية رسالة</span>
</label>

<label>
  <input type="radio" name="charityId" value="2">
  <span>بنك الطعام</span>
</label>

<label>
  <input type="radio" name="charityId" value="3">
  <span>مصر الخير</span>
</label>
      </div>  
    </div>  
  
    <button type="submit" id="submitBtn" class="btn_submit">إرسال التبرع</button>  
    <p id="msg" class="message"></p>  
  </form>  
</section>  
  
<footer>  
  <p>2026 © جميع الحقوق محفوظة – منصة عطاء</p>  
</footer>  
  
<script src="script/donation.js"></script>  
</body>  
</html>
