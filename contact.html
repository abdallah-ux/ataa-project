<section class="contact-section">
  <!-----------------------------------------form------------------------------------------>
  <div class="contact-form">
      <h2>راسلنا الآن</h2>

      <form id="contactForm">
          <div class="row">
              <input type="text" placeholder="الاسم" required>
              <input type="email" placeholder="البريد الإلكتروني" required>
          </div>

          <input type="text" placeholder="الموضوع" required>

          <textarea placeholder="الرسالة" rows="5" required></textarea>

          <button type="submit">إرسال الرسالة</button>
      </form>
  </div>

  <!---------------------------------contact---------------------------->
  <div class="contact-info">
      <h2>تواصل معنا</h2>
      <p>يسعدنا الرد على استفساراتكم واقتراحاتكم لتطوير المنصة.</p>

      <div class="info-box">
          <span><i class="fa-solid fa-envelope"></i></span>
          <div>
              <h4>البريد الإلكتروني</h4>
              <p>contact@ataa.com</p>
          </div>
      </div>

      <div class="info-box">
          <span><i class="fa-solid fa-phone"></i></span>
          <div>
              <h4>رقم الهاتف</h4>
              <p>01000000000</p>
          </div>
      </div>

      <div class="info-box">
          <span><i class="fa-solid fa-location-dot"></i></span>                                                                                           
          <div>
              <h4>الموقع</h4>
              <p>المنصورة - جمهورية مصر العربية</p>
          </div>
      </div>

  </div>

</section>
